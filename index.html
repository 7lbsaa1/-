<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشغل يوتيوب مخصص ونظيف</title>
  <!-- ربط ملف التنسيقات الخارجي -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>مشغل يوتيوب بواجهة نظيفة ومخصصة</h1>

  <div class="player-container">
    <!-- حاوية المشغل المطلوبة في السكربت -->
    <div id="playerWrapper">
      <!-- الـ Div الذي سيستبدله يوتيوب بالمشغل الفعلي -->
      <div id="player"></div>
      
      <!-- مؤشر التحميل -->
      <div id="spinner"></div>
    </div>

    <!-- أزرار التحكم والتقدم المخصصة -->
    <div class="controls">
      <!-- شريط التقدم -->
      <div class="progress-container" id="progressContainer">
        <div id="bufferBar"></div>
        <div id="progressBar"></div>
        <div id="timeThumb"></div>
      </div>

      <!-- الصف السفلي للأزرار والخيارات -->
      <div class="control-row">
        <div class="control-group">
          <!-- زر التشغيل / الإيقاف المؤقت -->
          <button class="btn" id="playPauseBtn" title="تشغيل / إيقاف">▶</button>
          
          <!-- عرض الوقت -->
          <div id="timeDisplay">0:00 <span>/</span> 0:00</div>
        </div>

        <div class="control-group">
          <!-- التحكم بالصوت -->
          <div class="volume-control">
            <button class="btn" id="muteBtn" title="كتم الصوت">🔊</button>
            <input type="range" id="volumeSlider" min="0" max="100" value="100">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ربط ملف الجافاسكريبت الخارجي بذكاء في نهاية الـ body -->
  <script src="player.js"></script>
</body>
</html>
